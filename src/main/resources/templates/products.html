<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Gestión de Almacén</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.4/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="content-area">
        <div th:replace="~{fragments/header :: header}"></div>
        
        <section class="page-content">
            <div class="panel-header">
                <h2>Inventario</h2>
                <p>Gestión integral de productos, stock y proveedores.</p>
            </div>

            <div class="card card-panel mb-4">
                <form class="row g-3" method="post" th:action="@{/products/save}" enctype="multipart/form-data">
                    <input type="hidden" name="id" th:value="${product?.id}"/>
                    <div class="col-md-4">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" class="form-control" name="name" th:value="${product?.name}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Categoría</label>
                        <select class="form-select" name="categoryId" required>
                            <option value="">Seleccione...</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == product?.category?.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Proveedor</label>
                        <select class="form-select" name="supplierId" required>
                            <option value="">Seleccione...</option>
                            <option th:each="sup : ${suppliers}" th:value="${sup.id}" th:text="${sup.name}" th:selected="${sup.id == product?.supplier?.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Stock</label>
                        <input type="number" class="form-control" name="quantity" th:value="${product?.quantity ?: 0}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Precio Venta</label>
                        <input type="number" step="0.01" class="form-control" name="salePrice" th:value="${product?.salePrice ?: 0.00}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Imagen</label>
                        <input type="file" class="form-control" name="imageFile">
                    </div>
                    <div class="col-12 text-end">
                        <button class="btn btn-primary">Guardar Producto</button>
                    </div>
                </form>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="card card-panel">
                        <h5>Añadir Categoría</h5>
                        <form th:action="@{/products/categories/save}" method="post" class="d-flex gap-2">
                            <input type="text" name="name" class="form-control" placeholder="Nombre..." required>
                            <button class="btn btn-dark">Añadir</button>
                        </form>
                        <ul class="list-group mt-3">
                            <li class="list-group-item d-flex justify-content-between" th:each="cat : ${categories}">
                                <span th:text="${cat.name}"></span>
                                <a th:href="@{/products/categories/delete/{id}(id=${cat.id})}" class="text-danger"><i class="fa fa-trash"></i></a>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card card-panel">
                        <h5>Añadir Proveedor</h5>
                        <form th:action="@{/products/suppliers/save}" method="post" class="d-flex gap-2">
                            <input type="text" name="name" class="form-control" placeholder="Nombre..." required>
                            <button class="btn btn-dark">Añadir</button>
                        </form>
                        <ul class="list-group mt-3">
                            <li class="list-group-item d-flex justify-content-between" th:each="sup : ${suppliers}">
                                <span th:text="${sup.name}"></span>
                                <a th:href="@{/products/suppliers/delete/{id}(id=${sup.id})}" class="text-danger"><i class="fa fa-trash"></i></a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="table-panel">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Imagen</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${products.content}">
                            <td><img th:if="${p.imageUrl}" th:src="${p.imageUrl}" width="40"></td>
                            <td th:text="${p.name}"></td>
                            <td th:text="${p.category?.name ?: 'S/C'}"></td>
                            <td th:text="${p.quantity}"></td>
                            <td>
                                <span class="status-tag" 
                                      th:classappend="${p.status == 'Agotado' ? 'status-red' : (p.status == 'Stock bajo' ? 'status-yellow' : 'status-green')}" 
                                      th:text="${p.status}"></span>
                            </td>
                            <td th:text="${p.salePrice}"></td>
                            <td>
                                <a th:href="@{/products/delete/{id}(id=${p.id})}" class="btn btn-sm btn-outline-danger">Eliminar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</div>
</body>
</html>
